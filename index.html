<!DOCTYPE html>
<html>
<head>
  <title>🏃🏿‍♂️Run.ai 📻Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: radial-gradient(circle at top, #0f0f0f, #000);
      color: #0ff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h2 {
      text-align: center;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
    }

    canvas {
      width:100%;
      height:120px;
      background:#000;
      border-radius:10px;
      box-shadow:0 0 10px #0ff;
      margin:15px 0;
    }

    .controls {
      text-align: center;
      margin: 20px 0;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background: #111;
      color: #0ff;
      box-shadow: 0 0 10px #0ff;
      cursor: pointer;
    }

    button.active {
      background: #0ff;
      color: #000;
    }

    input[type=range] {
      width: 100%;
    }

    .station { margin-bottom: 30px; }

    .track {
      padding: 12px;
      margin: 10px 0;
      background: #111;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,255,255,0.2);
    }

    .track:hover { box-shadow: 0 0 15px #0ff; }

    .progress {
      height: 5px;
      background: #222;
      border-radius: 5px;
      overflow: hidden;
      margin-top: 5px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0ff, #00f);
      box-shadow: 0 0 10px #0ff;
    }

    /* 🔊 Equalizer */
    .equalizer {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 40px;
      margin: 20px 0;
      gap: 4px;
    }

    .bar {
      width: 5px;
      height: 10px;
      background: #0ff;
      box-shadow: 0 0 8px #0ff;
      animation: bounce 1s infinite ease-in-out;
      animation-play-state: paused;
    }

    @keyframes bounce {
      0%,100% { height: 10px; }
      50% { height: 40px; }
    }
  </style>
</head>

<body>

<h2>🏃🏿‍♂️Run.ai 📻Radio</h2>

<!-- 🌊 Waveform -->
<canvas id="wave"></canvas>

<!-- 🔊 Equalizer -->
<div class="equalizer">
  <div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div>
  <div class="bar"></div>
</div>

<!-- 🎧 Audio Controls -->
<div class="controls">
  <button onclick="player.play()">▶</button>
  <button onclick="player.pause()">⏸</button>
  <button onclick="nextTrack()">⏭</button>

  <br>
  <input type="range" id="seek" value="0">
  <div id="time">0:00 / 0:00</div>

  <button id="shuffleBtn" onclick="toggleShuffle()">🔀</button>
  <button id="loopBtn" onclick="toggleLoop()">🔁</button>
</div>

<audio id="player"></audio>

<div id="stations"></div>

<script>
const player = document.getElementById("player");
const seek = document.getElementById("seek");
const timeDisplay = document.getElementById("time");
const eqBars = document.querySelectorAll(".bar");

// 🎵 Stations
const stations = {
  "New": Array.from({length:10}, (_,i)=>({title:`New ${i+1}`, src:`music/new${i+1}.mp3`})),
  "Trending": Array.from({length:10}, (_,i)=>({title:`Trending ${i+1}`, src:`music/trend${i+1}.mp3`})),
  "Lit": Array.from({length:10}, (_,i)=>({title:`Lit ${i+1}`, src:`music/lit${i+1}.mp3`}))
};

let currentList = [];
let currentIndex = 0;
let isShuffle = false;
let isLoop = false;

// 🎨 Render
function renderStations() {
  const container = document.getElementById("stations");
  container.innerHTML = "";

  Object.keys(stations).forEach(station => {
    const div = document.createElement("div");
    div.className = "station";

    const title = document.createElement("h3");
    title.innerText = "📻 " + station;
    div.appendChild(title);

    stations[station].forEach((track,i)=>{
      const t = document.createElement("div");
      t.className = "track";
      t.innerHTML = `${track.title}
        <div class="progress">
          <div class="progress-bar" id="p-${station}-${i}"></div>
        </div>`;
      t.onclick = ()=> playTrack(station,i);
      div.appendChild(t);
    });

    container.appendChild(div);
  });
}

// ▶️ Play
function playTrack(station,i){
  currentList = stations[station];
  currentIndex = i;
  player.src = currentList[i].src;
  player.play();
}

// 🔊 Equalizer
player.onplay = ()=> eqBars.forEach(b=>b.style.animationPlayState="running");
player.onpause = ()=> eqBars.forEach(b=>b.style.animationPlayState="paused");

// 🔀 Shuffle
function toggleShuffle(){
  isShuffle=!isShuffle;
  shuffleBtn.classList.toggle("active");
}

// 🔁 Loop
function toggleLoop(){
  isLoop=!isLoop;
  loopBtn.classList.toggle("active");
}

// ⏭ Next
function nextTrack(){
  if(isShuffle){
    currentIndex=Math.floor(Math.random()*currentList.length);
  } else {
    currentIndex=(currentIndex+1)%currentList.length;
  }
  player.src=currentList[currentIndex].src;
  player.play();
}

player.onended = ()=> isLoop ? player.play() : nextTrack();

// 🎚 Seek + Time
player.ontimeupdate = ()=>{
  if(!player.duration) return;

  seek.value = (player.currentTime/player.duration)*100;

  const f=t=>Math.floor(t/60)+":"+("0"+Math.floor(t%60)).slice(-2);
  timeDisplay.innerText = f(player.currentTime)+" / "+f(player.duration);

  document.querySelectorAll(".progress-bar").forEach(b=>b.style.width="0%");
  const name = Object.keys(stations).find(n=>stations[n]===currentList);
  if(name){
    const bar=document.getElementById(`p-${name}-${currentIndex}`);
    if(bar) bar.style.width=seek.value+"%";
  }
};

seek.oninput = ()=>{
  if(player.duration){
    player.currentTime = (seek.value/100)*player.duration;
  }
};

// 🌊 REAL Waveform (line curve)
const canvas = document.getElementById("wave");
const ctx = canvas.getContext("2d");

let audioCtx = new (window.AudioContext||window.webkitAudioContext)();
let analyser = audioCtx.createAnalyser();
let source;

document.body.onclick = ()=>{
  if(audioCtx.state==="suspended") audioCtx.resume();
};

player.onplay = ()=>{
  if(!source){
    source = audioCtx.createMediaElementSource(player);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  }
  draw();
};

function draw(){
  requestAnimationFrame(draw);

  const data = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(data);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.lineWidth = 2;
  ctx.strokeStyle = "#0ff";

  let slice = canvas.width / data.length;

  data.forEach((v,i)=>{
    let y = (v/255)*canvas.height;
    if(i===0){
      ctx.moveTo(0,y);
    } else {
      ctx.lineTo(i*slice,y);
    }
  });

  ctx.stroke();
}

// Init
renderStations();
</script>

</body>
</html>
