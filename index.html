<!DOCTYPE html>
<html>
<head>
  <title>RUN.AI Player</title>
</head>
<body>

<h2>🎧 RUN.AI Streaming Player</h2>

<audio id="player" controls>
  <source src="DFS1000.mp3" type="audio/mpeg">
</audio>

<br><br>

<button onclick="playSong()">Play</button>
<button onclick="pauseSong()">Pause</button>

<script>
const player = document.getElementById("player");

function playSong() {
  player.play();
}

function pauseSong() {
  player.pause();
}
</script>

</body>
</html>
