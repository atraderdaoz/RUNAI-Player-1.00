<!DOCTYPE html>
<html>
<head>
  <title>🏃🏿‍♂️Run.ai 📻Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { background:#000; color:#0ff; font-family:Arial; padding:20px; }
    h2 { text-align:center; }

    #nowPlaying { text-align:center; margin:10px 0; color:#fff; }

    canvas { width:100%; height:120px; background:#000; margin:15px 0; }

    .controls { text-align:center; }

    button {
      padding:8px; margin:4px;
      background:#111; color:#0ff; border:none; cursor:pointer;
    }

    .track { padding:10px; margin:8px 0; background:#111; cursor:pointer; }

    #stats { margin-top:10px; text-align:center; color:#fff; }

    #comments { margin-top:10px; }
  </style>
</head>

<body>

<h2>🏃🏿‍♂️Run.ai 📻Radio</h2>

<div id="nowPlaying">🎧 None</div>
<canvas id="wave"></canvas>

<div class="controls">
  <button onclick="player.play()">▶</button>
  <button onclick="player.pause()">⏸</button>
  <button onclick="nextTrack()">⏭</button>
</div>

<audio id="player"></audio>

<!-- 📊 STATS -->
<div id="stats"></div>

<!-- ❤️ + 💬 -->
<div style="text-align:center;">
  <button onclick="likeTrack()">❤️ Like</button>
</div>

<div style="text-align:center; margin-top:10px;">
  <input id="commentInput" placeholder="Comment..." style="width:60%">
  <button onclick="addComment()">💬 Post</button>
</div>

<div id="comments"></div>

<div id="stations"></div>

<script>
// ================= CONFIG =================
const API = "http://localhost:3000"; // backend
const CPM = 2;

// ================= ELEMENTS =================
const player = document.getElementById("player");
const nowPlaying = document.getElementById("nowPlaying");

// ================= TRACKS =================
const stations = {
  "New": Array.from({length:5},(_,i)=>({
    title:`Track ${i+1}`,
    src:`music/new${i+1}.mp3`
  }))
};

let currentList=[], currentIndex=0;

// ================= RENDER =================
function renderStations(){
  const container=document.getElementById("stations");
  container.innerHTML="";

  Object.keys(stations).forEach(name=>{
    const div=document.createElement("div");
    div.innerHTML=`<h3>${name}</h3>`;

    stations[name].forEach((t,i)=>{
      const el=document.createElement("div");
      el.className="track";
      el.innerText=t.title;

      el.onclick=()=>playTrack(name,i);
      div.appendChild(el);
    });

    container.appendChild(div);
  });
}

// ================= PLAY =================
async function playTrack(station,i){
  currentList=stations[station];
  currentIndex=i;

  const track=currentList[i];

  player.src=track.src;
  player.play();

  nowPlaying.innerText=`🎧 ${track.title}`;

  // 🔥 send play to backend
  const res = await fetch(API+"/play",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({track:track.src})
  });

  const data = await res.json();
  updateStats(track.src, data);
}

// ================= NEXT =================
function nextTrack(){
  currentIndex=(currentIndex+1)%currentList.length;
  playTrack("New", currentIndex);
}

// ================= STATS =================
function updateStats(track,data){
  const earnings = (data.plays/1000)*CPM;

  document.getElementById("stats").innerHTML = `
    ▶️ ${data.plays} Plays |
    ❤️ ${data.likes} Likes |
    💰 $${earnings.toFixed(4)}
  `;

  renderComments(data.comments);
}

// ================= LIKE =================
async function likeTrack(){
  const track=currentList[currentIndex].src;

  const res = await fetch(API+"/like",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({track})
  });

  const data = await res.json();
  updateStats(track,data);
}

// ================= COMMENTS =================
async function addComment(){
  const text=document.getElementById("commentInput").value;
  const track=currentList[currentIndex].src;

  const res = await fetch(API+"/comment",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({track,text})
  });

  const data = await res.json();
  renderComments(data.comments);
}

function renderComments(comments){
  document.getElementById("comments").innerHTML =
    comments.map(c=>`<div>💬 ${c}</div>`).join("");
}

// ================= WAVEFORM =================
const canvas = document.getElementById("wave");
const ctx = canvas.getContext("2d");

let audioCtx = new (window.AudioContext||window.webkitAudioContext)();
let analyser = audioCtx.createAnalyser();
let source;

function draw(){
  requestAnimationFrame(draw);

  const data = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(data);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  let slice = canvas.width/data.length;
  let x=0;

  for(let i=0;i<data.length;i++){
    let y=(data[i]/255)*canvas.height;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    x+=slice;
  }

  ctx.strokeStyle="#0ff";
  ctx.stroke();
}

player.onplay=()=>{
  if(!source){
    source=audioCtx.createMediaElementSource(player);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  }
  draw();
};

// INIT
renderStations();
</script>

</body>
</html>
