<!DOCTYPE html>
<html>
<head>
  <title>🏃🏿‍♂️Run.ai 📻Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: radial-gradient(circle at top, #0f0f0f, #000);
      color: #0ff;
      font-family: Arial;
      padding: 20px;
    }

    h2 { text-align:center; text-shadow:0 0 10px #0ff; }

    #nowPlaying {
      text-align:center;
      margin:10px 0;
      color:#fff;
      text-shadow:0 0 8px #0ff;
    }

    canvas {
      width:100%; height:120px;
      background:#000;
      border-radius:10px;
      box-shadow:0 0 10px #0ff;
      margin:15px 0;
    }

    .controls { text-align:center; }

    button {
      padding:10px; margin:5px;
      background:#111; color:#0ff;
      border:none;
      box-shadow:0 0 10px #0ff;
      cursor:pointer;
    }

    button.active { background:#0ff; color:#000; }

    input[type=range] { width:100%; }

    .track {
      padding:10px;
      margin:8px 0;
      background:#111;
      border-radius:8px;
      cursor:pointer;
    }

    .progress {
      height:5px;
      background:#222;
      margin-top:5px;
    }

    .progress-bar {
      height:100%;
      width:0%;
      background:#0ff;
    }

    .equalizer {
      display:flex;
      justify-content:center;
      height:40px;
      gap:4px;
    }

    .bar {
      width:5px;
      height:10px;
      background:#0ff;
      animation:bounce 1s infinite;
      animation-play-state:paused;
    }

    @keyframes bounce {
      50% { height:40px; }
    }
  </style>
</head>

<body>

<h2>🏃🏿‍♂️Run.ai 📻Radio</h2>

<div id="nowPlaying">🎧 Now Playing: None</div>

<canvas id="wave"></canvas>

<div class="equalizer">
  <div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div>
  <div class="bar"></div>
</div>

<div class="controls">
  <button onclick="player.play()">▶</button>
  <button onclick="player.pause()">⏸</button>
  <button onclick="nextTrack()">⏭</button>

  <input type="range" id="seek">
  <div id="time">0:00 / 0:00</div>

  <button id="shuffleBtn" onclick="toggleShuffle()">🔀</button>
  <button id="loopBtn" onclick="toggleLoop()">🔁</button>
</div>

<audio id="player"></audio>

<div id="stations"></div>

<div style="text-align:center; margin:15px;">
  <button onclick="donate()">💰 Donate XLM</button>
</div>

<script>
const STELLAR_ADDRESS = "0x60790faFA18390A53770184E6F8e53E0BC3Cf7D7";

// Generate Stellar payment link
function getXLMUrl(amount, memo="RunAI"){
  return `web+stellar:pay?destination=${STELLAR_ADDRESS}&amount=${amount}&memo=${encodeURIComponent(memo)}`;
}
  
const player = document.getElementById("player");
const seek = document.getElementById("seek");
const timeDisplay = document.getElementById("time");
const nowPlaying = document.getElementById("nowPlaying");
const eqBars = document.querySelectorAll(".bar");


const trackNames = {
  "new6.mp3": "Dynasty",
  "new3.mp3": "Midnight Flow",
  "trend2.mp3": "Street Code",
  "lit5.mp3": "Energy Burst"
};


// 🎵 Stations with names
const stations = {
  "New": Array.from({length:10}, (_,i)=>{
    const file = `new${i+1}.mp3`;
    return {
      title: trackNames[file] || `New Track ${i+1}`,
      src: `music/${file}`
    };
  }),

  "Trending": Array.from({length:10}, (_,i)=>{
    const file = `trend${i+1}.mp3`;
    return {
      title: trackNames[file] || `Trending ${i+1}`,
      src: `music/${file}`
    };
  }),

  "Lit": Array.from({length:10}, (_,i)=>{
    const file = `lit${i+1}.mp3`;
    return {
      title: trackNames[file] || `Lit ${i+1}`,
      src: `music/${file}`
    };
  })
};
let currentList = [];
let currentIndex = 0;
let isShuffle=false, isLoop=false;

// 🎨 Render
function renderStations(){
  const container = document.getElementById("stations");
  container.innerHTML="";

  Object.keys(stations).forEach(name=>{
    const div=document.createElement("div");
    div.innerHTML="<h3>📻 "+name+"</h3>";

    stations[name].forEach((t,i)=>{
      const el=document.createElement("div");
      el.className="track";
      el.innerHTML = `
  ${t.title}
  <button onclick="event.stopPropagation(); buyTrack('${t.title}')">💸 Support</button>
  <div class="progress">
    <div class="progress-bar" id="p-${name}-${i}"></div>
  </div>
`;
  el.onclick=()=>playTrack(name,i);
      div.appendChild(el);
    });

    container.appendChild(div);
  });
}
function buyTrack(title){
  alert(`Send BNB to:

0x60790faFA18390A53770184E6F8e53E0BC3Cf7D7

Amount: 0.001 BNB

Reference: ${title}`);
}


// ▶️ Play
function playTrack(station,i){
  currentList=stations[station];
  currentIndex=i;

  const track=currentList[i];

  player.src=track.src;
  player.play();

  nowPlaying.innerText=`🎧 ${station} • ${track.title}`;
}

// ⏭ Next
function nextTrack(){
  if(isShuffle){
    currentIndex=Math.floor(Math.random()*currentList.length);
  } else {
    currentIndex=(currentIndex+1)%currentList.length;
  }

  const station = Object.keys(stations).find(n=>stations[n]===currentList);
  playTrack(station,currentIndex);
}

// 🔀 / 🔁
function toggleShuffle(){ isShuffle=!isShuffle; shuffleBtn.classList.toggle("active"); }
function toggleLoop(){ isLoop=!isLoop; loopBtn.classList.toggle("active"); }

player.onended=()=> isLoop ? player.play() : nextTrack();

// 🎚 Seek + Time
player.ontimeupdate=()=>{
  if(!player.duration) return;

  seek.value=(player.currentTime/player.duration)*100;

  const f=t=>Math.floor(t/60)+":"+("0"+Math.floor(t%60)).slice(-2);
  timeDisplay.innerText=f(player.currentTime)+" / "+f(player.duration);

  document.querySelectorAll(".progress-bar").forEach(b=>b.style.width="0%");
  const station=Object.keys(stations).find(n=>stations[n]===currentList);
  if(station){
    const bar=document.getElementById(`p-${station}-${currentIndex}`);
    if(bar) bar.style.width=seek.value+"%";
  }
};

seek.oninput=()=> player.currentTime=(seek.value/100)*player.duration;

// 🔊 Equalizer
player.onplay=()=> eqBars.forEach(b=>b.style.animationPlayState="running");
player.onpause=()=> eqBars.forEach(b=>b.style.animationPlayState="paused");

// 🌊 Waveform
const canvas=document.getElementById("wave");
const ctx=canvas.getContext("2d");

let audioCtx=new (window.AudioContext||window.webkitAudioContext)();
let analyser=audioCtx.createAnalyser();
let source;

document.body.onclick=()=>{ if(audioCtx.state==="suspended") audioCtx.resume(); };

player.onplay=()=>{
  if(!source){
    source=audioCtx.createMediaElementSource(player);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  }
  draw();
};

function draw(){
  requestAnimationFrame(draw);

  const data=new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(data);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.strokeStyle="#0ff";

  let slice=canvas.width/data.length;

  data.forEach((v,i)=>{
    let y=(v/255)*canvas.height;
    i===0 ? ctx.moveTo(0,y) : ctx.lineTo(i*slice,y);
  });

  ctx.stroke();
}

function donate(){
  const url = getXLMUrl(1, "Donation RunAI Radio");
  window.location.href = url;
  }

// Init
renderStations();
</script>

</body>
</html>
