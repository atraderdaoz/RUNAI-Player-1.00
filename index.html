<!DOCTYPE html>
<html>
<head>
  <title>рЯПГрЯПњвАНвЩВпЄПRun.ai рЯУїRadio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: radial-gradient(circle at top, #0f0f0f, #000);
      color: #0ff;
      font-family: Arial;
      padding: 20px;
    }

    h2 { text-align:center; text-shadow:0 0 10px #0ff; }

    #nowPlaying {
      text-align:center;
      margin:10px 0;
      color:#fff;
    }

    canvas {
      width:100%; height:120px;
      background:#000;
      border-radius:10px;
      margin:15px 0;
    }

    .controls { text-align:center; }

    button {
      padding:10px; margin:5px;
      background:#111; color:#0ff;
      border:none;
      box-shadow:0 0 10px #0ff;
      cursor:pointer;
    }

    button.active { background:#0ff; color:#000; }

    input[type=range] { width:100%; }

    .track {
      padding:10px;
      margin:8px 0;
      background:#111;
      border-radius:8px;
      cursor:pointer;
    }

    .progress { height:5px; background:#222; margin-top:5px; }
    .progress-bar { height:100%; width:0%; background:#0ff; }

    .equalizer {
      display:flex;
      justify-content:center;
      height:40px;
      gap:4px;
    }

    .bar {
      width:5px;
      height:10px;
      background:#0ff;
      animation:bounce 1s infinite;
      animation-play-state:paused;
    }

    @keyframes bounce { 50% { height:40px; } }

    /* рЯТ∞ Modal */
    #paymentModal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.9);
      justify-content:center;
      align-items:center;
      z-index:999;
    }
  </style>
</head>

<body>

<h2>рЯПГрЯПњвАНвЩВпЄПRun.ai рЯУїRadio</h2>

<div id="nowPlaying">рЯОІ Now Playing: None</div>

<canvas id="wave"></canvas>

<div class="equalizer">
  <div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div>
  <div class="bar"></div>
</div>

<div class="controls">
  <button onclick="player.play()">вЦґ</button>
  <button onclick="player.pause()">вПЄ</button>
  <button onclick="nextTrack()">вП≠</button>

  <input type="range" id="seek">
  <div id="time">0:00 / 0:00</div>

  <button id="shuffleBtn" onclick="toggleShuffle()">рЯФА</button>
  <button id="loopBtn" onclick="toggleLoop()">рЯФБ</button>
</div>

<audio id="player"></audio>

<!-- рЯТ∞ PAYMENT MODAL -->
<div id="paymentModal">
  <div style="
    background:#111;
    padding:20px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 20px #0ff;
    max-width:300px;
  ">
    <h3>рЯТ∞ Support Track</h3>

    <img src="WA_1776604572672.jpeg" style="width:200px; border-radius:10px;" />

    <div id="payDetails" style="font-size:12px; color:#aaa; margin-top:10px;"></div>

    <button onclick="closeModal()">вЭМ Close</button>
  </div>
</div>

<div id="stations"></div>

<script>
const WALLET = "0x60790faFA18390A53770184E6F8e53E0BC3Cf7D7";

const player = document.getElementById("player");
const seek = document.getElementById("seek");
const timeDisplay = document.getElementById("time");
const nowPlaying = document.getElementById("nowPlaying");
const eqBars = document.querySelectorAll(".bar");

const trackNames = {
  "new6.mp3": "Dynasty",
  "new3.mp3": "Midnight Flow"
};

const stations = {
  "New": Array.from({length:10}, (_,i)=>{
    const file=`new${i+1}.mp3`;
    return { title: trackNames[file] || `New ${i+1}`, src:`music/${file}` };
  }),
  "Trending": Array.from({length:10}, (_,i)=>{
    const file=`trend${i+1}.mp3`;
    return { title:`Trending ${i+1}`, src:`music/${file}` };
  }),
  "Lit": Array.from({length:10}, (_,i)=>{
    const file=`lit${i+1}.mp3`;
    return { title:`Lit ${i+1}`, src:`music/${file}` };
  })
};

let currentList=[], currentIndex=0, isShuffle=false, isLoop=false;

function renderStations(){
  const container=document.getElementById("stations");
  container.innerHTML="";

  Object.keys(stations).forEach(name=>{
    const div=document.createElement("div");
    div.innerHTML=`<h3>рЯУї ${name}</h3>`;

    stations[name].forEach((t,i)=>{
      const el=document.createElement("div");
      el.className="track";

      el.innerHTML=`
        ${t.title}
        <button onclick="event.stopPropagation(); openPayment('${t.title}')">рЯТЄ Support</button>
        <div class="progress"><div class="progress-bar" id="p-${name}-${i}"></div></div>
      `;

      el.onclick=()=>playTrack(name,i);
      div.appendChild(el);
    });

    container.appendChild(div);
  });
}

function openPayment(title){
  document.getElementById("paymentModal").style.display="flex";

  document.getElementById("payDetails").innerHTML=`
    Send: 0.001 BNB<br><br>
    Wallet:<br>${WALLET}<br><br>
    Reference:<br>${title}
  `;
}

function closeModal(){
  document.getElementById("paymentModal").style.display="none";
}

function playTrack(station,i){
  currentList=stations[station];
  currentIndex=i;
  const track=currentList[i];

  player.src=track.src;
  player.play();

  nowPlaying.innerText=`рЯОІ ${station} вАҐ ${track.title}`;
}

function nextTrack(){
  currentIndex = isShuffle
    ? Math.floor(Math.random()*currentList.length)
    : (currentIndex+1)%currentList.length;

  const station=Object.keys(stations).find(n=>stations[n]===currentList);
  playTrack(station,currentIndex);
}

function toggleShuffle(){ isShuffle=!isShuffle; }
function toggleLoop(){ isLoop=!isLoop; }

player.onended=()=> isLoop ? player.play() : nextTrack();

player.ontimeupdate=()=>{
  if(!player.duration) return;

  seek.value=(player.currentTime/player.duration)*100;

  const f=t=>Math.floor(t/60)+":"+("0"+Math.floor(t%60)).slice(-2);
  timeDisplay.innerText=f(player.currentTime)+" / "+f(player.duration);
};

seek.oninput=()=> player.currentTime=(seek.value/100)*player.duration;

player.onplay=()=> eqBars.forEach(b=>b.style.animationPlayState="running");
player.onpause=()=> eqBars.forEach(b=>b.style.animationPlayState="paused");

// Init
renderStations();
</script>

</body>
</html>
