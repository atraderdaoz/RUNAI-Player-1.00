<!DOCTYPE html>
<html>
<head>
  <title>🏃🏿‍♂️Run.ai 📻Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: radial-gradient(circle, #0a0a0a, #000);
      color: #0ff;
      font-family: Arial;
      padding: 20px;
    }

    h2 {
      text-align:center;
      text-shadow:0 0 10px #0ff;
    }

    canvas {
      width:100%;
      height:100px;
      background:#000;
      border-radius:10px;
      box-shadow:0 0 10px #0ff;
      margin:15px 0;
    }

    .controls {
      text-align:center;
    }

    button {
      padding:10px;
      margin:5px;
      background:#111;
      color:#0ff;
      border:none;
      box-shadow:0 0 10px #0ff;
    }

    .seek {
      width:100%;
    }

    .subtitle {
      text-align:center;
      margin-top:10px;
      font-size:14px;
      color:#fff;
      text-shadow:0 0 5px #0ff;
    }

    .track {
      padding:10px;
      margin:8px 0;
      background:#111;
      border-radius:8px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2>🏃🏿‍♂️Run.ai 📻Radio</h2>

<canvas id="wave"></canvas>

<div class="controls">
  <button onclick="player.play()">▶</button>
  <button onclick="player.pause()">⏸</button>
  <button onclick="nextTrack()">⏭</button>
  <br>
  <input type="range" id="seek" class="seek" value="0">
  <div id="time">0:00 / 0:00</div>
</div>

<div class="subtitle" id="subtitle">🎤 Subtitles appear here</div>

<audio id="player"></audio>

<div id="tracks"></div>

<script>
const player = document.getElementById("player");
const seek = document.getElementById("seek");
const timeDisplay = document.getElementById("time");
const subtitle = document.getElementById("subtitle");

// 🎵 Tracks with subtitles
const tracks = [
  {title:"Track 1", src:"song1.mp3", subs:[
    {t:2, text:"Intro vibe starts"},
    {t:10, text:"Feel the rhythm"},
    {t:20, text:"Energy rising"}
  ]},
  {title:"Track 2", src:"song2.mp3", subs:[
    {t:3, text:"New wave flow"},
    {t:12, text:"Bass hits"},
    {t:25, text:"Drop incoming"}
  ]}
];

let currentIndex = 0;

// ▶️ Load track
function loadTrack(i){
  currentIndex = i;
  player.src = tracks[i].src;
  player.play();
}

// ⏭ Next
function nextTrack(){
  currentIndex = (currentIndex + 1) % tracks.length;
  loadTrack(currentIndex);
}

// 🎚 Seek
player.addEventListener("timeupdate", () => {
  if (!player.duration) return;

  seek.value = (player.currentTime / player.duration) * 100;

  // ⏱ Time display
  const format = t => Math.floor(t/60)+":"+("0"+Math.floor(t%60)).slice(-2);
  timeDisplay.innerText = format(player.currentTime) + " / " + format(player.duration);

  // 📝 Subtitles
  const subs = tracks[currentIndex].subs;
  let currentText = "";
  subs.forEach(s => {
    if(player.currentTime >= s.t) currentText = s.text;
  });
  subtitle.innerText = currentText;
});

seek.addEventListener("input", () => {
  player.currentTime = (seek.value / 100) * player.duration;
});

// 🌊 Waveform Visualization
const canvas = document.getElementById("wave");
const ctx = canvas.getContext("2d");

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let analyser = audioCtx.createAnalyser();
let source;

player.addEventListener("play", () => {
  if (!source) {
    source = audioCtx.createMediaElementSource(player);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  }
  draw();
});

function draw(){
  requestAnimationFrame(draw);

  const buffer = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buffer);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let barWidth = canvas.width / buffer.length;

  buffer.forEach((v,i)=>{
    let h = v / 2;
    ctx.fillStyle = "#0ff";
    ctx.fillRect(i*barWidth, canvas.height-h, barWidth, h);
  });
}

// 🎵 Render list
const container = document.getElementById("tracks");
tracks.forEach((t,i)=>{
  const div = document.createElement("div");
  div.className = "track";
  div.innerText = t.title;
  div.onclick = () => loadTrack(i);
  container.appendChild(div);
});

// Init
loadTrack(0);
</script>

</body>
</html>
