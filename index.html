<!DOCTYPE html>
<html>
<head>
  <title>рЯПГрЯПњвАНвЩВпЄПRun.ai рЯУїRadio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: radial-gradient(circle at top, #0f0f0f, #000);
      color: #0ff;
      font-family: Arial;
      padding: 20px;
    }

    h2 { text-align:center; text-shadow:0 0 10px #0ff; }

    #nowPlaying { text-align:center; margin:10px 0; color:#fff; }

    canvas {
      width:100%;
      height:120px;
      background:#000;
      border-radius:10px;
      margin:15px 0;
      box-shadow:0 0 10px #0ff;
    }

    .controls { text-align:center; }

    button {
      padding:10px;
      margin:5px;
      background:#111;
      color:#0ff;
      border:none;
      box-shadow:0 0 10px #0ff;
      cursor:pointer;
    }

    button.active { background:#0ff; color:#000; }

    input[type=range] { width:100%; }

    .track {
      padding:10px;
      margin:8px 0;
      background:#111;
      border-radius:8px;
      cursor:pointer;
    }

    .progress { height:5px; background:#222; margin-top:5px; }
    .progress-bar { height:100%; width:0%; background:#0ff; }

    .equalizer {
      display:flex;
      justify-content:center;
      height:40px;
      gap:4px;
    }

    .bar {
      width:5px;
      height:10px;
      background:#0ff;
      animation:bounce 1s infinite;
      animation-play-state:paused;
    }

    @keyframes bounce { 50% { height:40px; } }

    #paymentModal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.9);
      justify-content:center;
      align-items:center;
      z-index:999;
    }
  </style>
</head>

<body>

<h2>рЯПГрЯПњвАНвЩВпЄПRun.ai рЯУїRadio</h2>

<div id="nowPlaying">рЯОІ Now Playing: None</div>

<canvas id="wave"></canvas>

<div class="equalizer">
  <div class="bar"></div><div class="bar"></div>
  <div class="bar"></div><div class="bar"></div>
  <div class="bar"></div>
</div>

<div class="controls">
  <button onclick="player.play()">вЦґ</button>
  <button onclick="player.pause()">вПЄ</button>
  <button onclick="nextTrack()">вП≠</button>

  <input type="range" id="seek">
  <div id="time">0:00 / 0:00</div>

  <button id="shuffleBtn" onclick="toggleShuffle()">рЯФА</button>
  <button id="loopBtn" onclick="toggleLoop()">рЯФБ</button>
</div>

<audio id="player"></audio>

<!-- PAYMENT MODAL -->
<div id="paymentModal">
  <div style="background:#111;padding:20px;border-radius:10px;text-align:center;box-shadow:0 0 20px #0ff;max-width:300px;">
    <h3>рЯТ∞ Support Track</h3>

    <img src="WA_1776604572672.jpeg" style="width:200px;border-radius:10px;" />

    <div id="payDetails" style="font-size:12px;color:#aaa;margin-top:10px;"></div>

    <input id="txHashInput" placeholder="Paste TX Hash" style="width:100%;margin-top:10px;" />

    <button onclick="verifyPayment()">вЬЕ Verify</button>
    <button onclick="closeModal()">вЭМ Close</button>
  </div>
</div>

<div id="stations"></div>

<script>
// ================= WALLET =================
const WALLET = "0x60790faFA18390A53770184E6F8e53E0BC3Cf7D7";

// ================= ELEMENTS =================
const player = document.getElementById("player");
const seek = document.getElementById("seek");
const timeDisplay = document.getElementById("time");
const nowPlaying = document.getElementById("nowPlaying");
const eqBars = document.querySelectorAll(".bar");

// ================= WAVEFORM =================
const canvas = document.getElementById("wave");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let audioCtx = new (window.AudioContext||window.webkitAudioContext)();
let analyser = audioCtx.createAnalyser();
analyser.fftSize = 2048;

let source;
let drawing=false;

document.addEventListener("click", ()=>{
  if(audioCtx.state==="suspended") audioCtx.resume();
});

function draw(){
  requestAnimationFrame(draw);

  const data = new Uint8Array(analyser.fftSize);
  analyser.getByteTimeDomainData(data);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.beginPath();
  ctx.strokeStyle="#0ff";

  let slice=canvas.width/data.length;
  let x=0;

  for(let i=0;i<data.length;i++){
    let v=data[i]/128.0;
    let y=(v*canvas.height)/2;

    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);

    x+=slice;
  }

  ctx.stroke();
}

player.addEventListener("play", ()=>{
  if(!source){
    source=audioCtx.createMediaElementSource(player);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  }

  if(!drawing){
    drawing=true;
    draw();
  }

  eqBars.forEach(b=>b.style.animationPlayState="running");
});

player.addEventListener("pause", ()=>{
  eqBars.forEach(b=>b.style.animationPlayState="paused");
});

// ================= TRACK NAMES =================
const trackNames = {
  "new1.mp3": "King Kanshi",
  "new2.mp3": "Mehsun",
  "new3.mp3": "Law1",
  "new4.mp3": "Sovereign AI",
  "new5.mp3": "Ants Call",
  "new6.mp3": "Dynasty",
  "new7.mp3": "RUN Levelup",
  "new8.mp3": "Good",
  "new9.mp3": "Riddim",
  "new10.mp3": "Groveman"
};

// ================= STATIONS =================
const stations = {
  "New": Array.from({length:10},(_,i)=>{
    const file=`new${i+1}.mp3`;
    return {title:trackNames[file]||file,src:`music/${file}`};
  }),
  "Trending": Array.from({length:10},(_,i)=>{
    const file=`trend${i+1}.mp3`;
    return {title:file,src:`music/${file}`};
  }),
  "Lit": Array.from({length:10},(_,i)=>{
    const file=`lit${i+1}.mp3`;
    return {title:file,src:`music/${file}`};
  })
};

let currentList=[],currentIndex=0,isShuffle=false,isLoop=false;
let currentPurchase={};

// ================= RENDER =================
function renderStations(){
  const container=document.getElementById("stations");
  container.innerHTML="";

  Object.keys(stations).forEach(name=>{
    const div=document.createElement("div");
    div.innerHTML=`<h3>рЯУї ${name}</h3>`;

    stations[name].forEach((t,i)=>{
      const safeId=t.src.replace(/[/.]/g,"_");

      const el=document.createElement("div");
      el.className="track";

      el.innerHTML=`
        ${t.title}
        <button onclick="event.stopPropagation(); openPayment('${t.title}','${t.src}')">рЯТЄ</button>
        <button id="dl-${safeId}" style="display:none;" onclick="downloadTrack('${t.src}')">вђЗпЄП</button>
        <div class="progress"><div class="progress-bar" id="p-${name}-${i}"></div></div>
      `;

      el.onclick=()=>playTrack(name,i);
      div.appendChild(el);
    });

    container.appendChild(div);
  });
}

// ================= PLAYER =================
function playTrack(station,i){
  currentList=stations[station];
  currentIndex=i;
  const track=currentList[i];

  player.src=track.src;
  player.play();

  nowPlaying.innerText=`рЯОІ ${station} вАҐ ${track.title}`;
}

function nextTrack(){
  currentIndex=isShuffle
    ? Math.floor(Math.random()*currentList.length)
    : (currentIndex+1)%currentList.length;

  const station=Object.keys(stations).find(n=>stations[n]===currentList);
  playTrack(station,currentIndex);
}

function toggleShuffle(){
  isShuffle=!isShuffle;
  document.getElementById("shuffleBtn").classList.toggle("active");
}

function toggleLoop(){
  isLoop=!isLoop;
  document.getElementById("loopBtn").classList.toggle("active");
}

player.onended=()=> isLoop?player.play():nextTrack();

// ================= SEEK =================
player.ontimeupdate=()=>{
  if(!player.duration) return;

  seek.value=(player.currentTime/player.duration)*100;

  const f=t=>Math.floor(t/60)+":"+("0"+Math.floor(t%60)).slice(-2);
  timeDisplay.innerText=f(player.currentTime)+" / "+f(player.duration);
};

seek.oninput=()=>{
  if(player.duration){
    player.currentTime=(seek.value/100)*player.duration;
  }
};

// ================= PAYMENT =================
function openPayment(title,src){
  currentPurchase={title,src};

  document.getElementById("paymentModal").style.display="flex";
  document.getElementById("payDetails").innerHTML=`
    Send: 0.001 BNB<br><br>
    Wallet:<br>${WALLET}<br><br>
    Ref:<br>${title}
  `;
}

function verifyPayment(){
  const tx=document.getElementById("txHashInput").value.trim();
  if(!tx) return alert("Enter TX hash");

  unlockDownload(currentPurchase.src);
  closeModal();
  alert("вЬЕ Payment Verified (Demo)");
}

function unlockDownload(src){
  const id="dl-"+src.replace(/[/.]/g,"_");
  const btn=document.getElementById(id);
  if(btn) btn.style.display="inline-block";
}

function downloadTrack(src){
  const a=document.createElement("a");
  a.href=src;
  a.download=src.split("/").pop();
  a.click();
}

function closeModal(){
  document.getElementById("paymentModal").style.display="none";
}

// INIT
renderStations();
</script>

</body>
</html>
