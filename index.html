<!DOCTYPE html>
<html>
<head>
  <title>🏃🏿‍♂️Run.ai 📻Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: radial-gradient(circle, #0a0a0a, #000);
      color: #0ff;
      font-family: Arial;
      padding: 20px;
    }

    h2 {
      text-align:center;
      text-shadow:0 0 10px #0ff;
    }

    canvas {
      width:100%;
      height:120px;
      background:#000;
      border-radius:10px;
      box-shadow:0 0 10px #0ff;
      margin:15px 0;
    }

    .controls {
      text-align:center;
      margin-bottom:15px;
    }

    button {
      padding:10px;
      margin:5px;
      background:#111;
      color:#0ff;
      border:none;
      box-shadow:0 0 10px #0ff;
      cursor:pointer;
    }

    input[type=range] {
      width:100%;
    }

    #time {
      margin-top:5px;
      font-size:14px;
    }

    .subtitle {
      text-align:center;
      margin:10px 0;
      color:#fff;
      text-shadow:0 0 5px #0ff;
    }

    .track {
      padding:10px;
      margin:8px 0;
      background:#111;
      border-radius:8px;
      cursor:pointer;
    }

    .track:hover {
      box-shadow:0 0 10px #0ff;
    }
  </style>
</head>

<body>

<h2>🏃🏿‍♂️Run.ai 📻Radio</h2>

<canvas id="wave"></canvas>

<div class="controls">
  <button onclick="play()">▶ Play</button>
  <button onclick="pause()">⏸ Pause</button>
  <button onclick="nextTrack()">⏭ Next</button>

  <input type="range" id="seek" value="0">
  <div id="time">0:00 / 0:00</div>
</div>

<div class="subtitle" id="subtitle">🎤 Subtitles ready</div>

<audio id="player"></audio>

<div id="tracks"></div>

<script>
const player = document.getElementById("player");
const seek = document.getElementById("seek");
const timeDisplay = document.getElementById("time");
const subtitle = document.getElementById("subtitle");

// ✅ IMPORTANT: correct relative paths
const tracks = [
  {title:"Track 1", src:"music/new1.mp3", subs:[
    {t:2, text:"Intro starts"},
    {t:8, text:"Beat drops"},
    {t:15, text:"Energy rising"}
  ]},
  {title:"Track 2", src:"music/trend1.mp3", subs:[
    {t:3, text:"New vibe"},
    {t:10, text:"Bass hits"},
    {t:20, text:"Drop incoming"}
  ]}
];

let currentIndex = 0;

// ▶️ Controls
function play(){ player.play(); }
function pause(){ player.pause(); }

function loadTrack(i){
  currentIndex = i;
  player.src = tracks[i].src;
  player.play();
}

function nextTrack(){
  currentIndex = (currentIndex + 1) % tracks.length;
  loadTrack(currentIndex);
}

// 🎚 Seek + Time + Subtitles
player.addEventListener("timeupdate", () => {
  if (!player.duration) return;

  seek.value = (player.currentTime / player.duration) * 100;

  const format = t => Math.floor(t/60)+":"+("0"+Math.floor(t%60)).slice(-2);
  timeDisplay.innerText = format(player.currentTime) + " / " + format(player.duration);

  // 📝 stable subtitles
  const subs = tracks[currentIndex].subs;
  let active = subs.filter(s => player.currentTime >= s.t).pop();
  subtitle.innerText = active ? active.text : "";
});

seek.addEventListener("input", () => {
  if (player.duration) {
    player.currentTime = (seek.value / 100) * player.duration;
  }
});

// 🌊 Waveform (FIXED + centered)
const canvas = document.getElementById("wave");
const ctx = canvas.getContext("2d");

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let analyser = audioCtx.createAnalyser();
let source;

// 🔊 FIX: resume audio context on user interaction
document.body.addEventListener("click", () => {
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
});

player.addEventListener("play", () => {
  if (!source) {
    source = audioCtx.createMediaElementSource(player);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);
  }
  draw();
});

function draw(){
  requestAnimationFrame(draw);

  const buffer = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(buffer);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let barWidth = canvas.width / buffer.length;

  buffer.forEach((v,i)=>{
    let h = v / 3;

    ctx.fillStyle = "#0ff";
    ctx.fillRect(i*barWidth, canvas.height/2 - h/2, barWidth, h);
  });
}

// 🎵 Render track list
const container = document.getElementById("tracks");
tracks.forEach((t,i)=>{
  const div = document.createElement("div");
  div.className = "track";
  div.innerText = t.title;
  div.onclick = () => loadTrack(i);
  container.appendChild(div);
});

// Init
loadTrack(0);

</script>

</body>
</html>
